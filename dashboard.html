<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<script>

if(localStorage.getItem("login") != "true"){
    window.location.href = "login.html";
}

</script>
<body>

<div class="content">
    <h1>Dashboard Mie Pedes Meledak</h1>

    <div class="card-container">
        <div class="card">
            <h3>Total Produk</h3>
            <p>14 Menu</p>
        </div>

        <div class="card">
            <h3>Total Pelanggan</h3>
            <p>25 Orang</p>
        </div>

        <div class="card">
            <h3>Total Transaksi</h3>
            <p>150</p>
        </div>

        <div class="card">
            <h3>Pendapatan</h3>
            <p>Rp5.000.000</p>
        </div>
    </div>

</div>

</body>
</html>

<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login Admin - Mie Pedes Meledak</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#f5f5f5;
}

.login-container{
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

.login-box{
    width:450px;
    background:white;
    padding:50px;
    border-radius:25px;
    text-align:center;
    box-shadow:0px 5px 20px rgba(0,0,0,0.15);
}

.login-box h1{
    color:#d62828;
    margin-bottom:10px;
}

.login-box h2{
    margin-bottom:30px;
}

.login-box input{
    width:100%;
    padding:15px;
    margin-bottom:20px;
    border:1px solid #ccc;
    border-radius:10px;
}

.login-box button{
    width:100%;
    padding:15px;
    background:#d62828;
    color:white;
    border:none;
    border-radius:10px;
    cursor:pointer;
}

.login-box button:hover{
    background:red;
}

#pesan{
    margin-top:15px;
    color:red;
}

</style>
</head>
<body>

<div class="login-container">

    <div class="login-box">

        <h1>🌶 Mie Pedes Meledak</h1>
        <h2>Login Admin</h2>

        <input type="text" id="username" placeholder="Username">

        <input type="password" id="password" placeholder="Password">

        <button onclick="login()">Login</button>

        <p id="pesan"></p>

    </div>

</div>

<script>

function login(){

    let username = document.getElementById("username").value;
    let password = document.getElementById("password").value;

    if(username === "admin" && password === "12345"){

        // menyimpan status login
        localStorage.setItem("login", "true");

        alert("Login berhasil!");

        // pindah ke dashboard
        window.location.href = "dashboard.html";
    }
    else{
        document.getElementById("pesan").innerHTML =
        "Username atau Password salah!";
    }
}

</script>

</body>
</html>
